<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#1e3d8f;color:white;padding:14px;font-size:18px}
.container{padding:14px;max-width:1200px;margin:auto}
.card{background:white;padding:16px;margin-bottom:14px;border-radius:8px;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;font-size:13px}
textarea{height:50px}
button{padding:8px 12px;border:none;background:#1e3d8f;color:white;border-radius:6px;margin:4px;cursor:pointer}
.roomTab{display:inline-block;padding:8px 12px;border:1px solid #ccc;margin:3px;border-radius:6px;cursor:pointer}
.wallBox{display:flex;gap:12px;margin-top:4px}
.radioBox{display:flex;gap:10px}
.accordion{cursor:pointer;background:#eef2ff;padding:10px;border-radius:6px;margin-top:10px}
.accordionContent{display:none;padding-top:10px}
.questionRow{margin-bottom:12px;padding:8px;border-radius:6px}
.statusAnswered{background:#e6f7e6}
.statusPending{background:#ffe6e6}
.progressBar{height:8px;background:#ddd;border-radius:4px;margin-top:6px}
.progressFill{height:100%;background:#1e3d8f;border-radius:4px}
.summaryBox{background:#f9fafc;padding:10px;border-radius:6px;margin-bottom:10px}
</style>
</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">
<h3>Preliminary Project Details</h3>
<div class="grid">
<input id="pid" placeholder="PID" onchange="saveData()">
<input id="cx" placeholder="Cx Name" onchange="saveData()">
<input id="city" placeholder="City" onchange="saveData()">
<input id="address" placeholder="Address" onchange="saveData()">
<input id="society" placeholder="Society Name" onchange="saveData()">
<input id="flat" placeholder="Flat No" onchange="saveData()">
<input id="floorNo" placeholder="Floor No" onchange="saveData()">
</div>
</div>

<div class="card">
<h3>Society Constraints</h3>
<div class="grid">
<div class="field"><label>Service lift usage allowed?</label><select id="serviceLiftUsage" onchange="saveData()"><option></option><option>Allowed</option><option>Not Allowed</option></select></div>
<div class="field"><label>Debris loading area</label><select id="loadingArea" onchange="saveData()"><option></option><option>Within 30 ft</option><option>More than 30 ft</option></select></div>
<div class="field"><label>Debris dumping allowed?</label><select id="debrisDumping" onchange="saveData()"><option></option><option>Yes</option><option>No</option></select></div>
<div class="field"><label>Vehicle entry possible?</label><select id="vehicleEntry" onchange="saveData()"><option></option><option>Yes</option><option>No</option></select></div>
</div>
</div>

<div class="card">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">
<button onclick="generateExcel()">Generate Excel</button>
</div>

</div>

<script>

const walls=["NW","EW","SW","WW"]

const roomQuestions=["Is flooring OK?","Tile on tile possible?","Ceiling clearance OK?"]
const wallQuestions=["Wall load-bearing?","Wall cracks?","Wall uneven?"]

const defaultRooms=["Living Room","Kitchen"]
let roomOrder=[...defaultRooms]

let data={rooms:{}}
roomOrder.forEach(r=>data.rooms[r]={room:{},wall:{},wallSel:{}})

function saveData(){}

function renderTabs(activeRoom){
roomTabs.innerHTML=roomOrder.map(r=>`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`).join("")
}

function createYesNoRadio(value,callback){
let div=document.createElement("div")
div.className="radioBox"
;["Yes","No"].forEach(v=>{
let input=document.createElement("input")
input.type="radio"
input.checked=value===v
input.onchange=()=>callback(v)
div.append(input,v)
})
return div
}

function applyAllWalls(val,room){
wallQuestions.forEach(q=>data.rooms[room].wall[q]=val)
openRoom(room)
}

function openRoom(room){

const r=data.rooms[room]
renderTabs(room)

const container=document.getElementById("roomForm")
container.innerHTML=""

let total=roomQuestions.length+wallQuestions.length
let answered=0

wallQuestions.forEach(q=>{if(r.wall[q])answered++})
roomQuestions.forEach(q=>{if(r.room[q])answered++})

let percent=Math.round((answered/total)*100)

container.innerHTML+=`
<h3>${room} (${percent}%)</h3>
<div class="progressBar"><div class="progressFill" style="width:${percent}%"></div></div>
<div class="summaryBox">${answered}/${total} answered</div>
`

function accordion(title){
let a=document.createElement("div")
a.className="accordion"
a.textContent=title
let c=document.createElement("div")
c.className="accordionContent"
a.onclick=()=>c.style.display=c.style.display==="block"?"none":"block"
container.append(a,c)
return c
}

let wallSec=accordion("Wall Questions")

wallSec.innerHTML+=`
<button onclick="applyAllWalls('Yes','${room}')">Yes All</button>
<button onclick="applyAllWalls('No','${room}')">No All</button>
`

wallQuestions.forEach(q=>{
let div=document.createElement("div")
div.className="questionRow "+(r.wall[q]?"statusAnswered":"statusPending")

let radio=createYesNoRadio(r.wall[q],v=>{
r.wall[q]=v
openRoom(room)
})

div.append(q,radio)
wallSec.appendChild(div)
})

let roomSec=accordion("Room Questions")

roomQuestions.forEach(q=>{
let div=document.createElement("div")
let radio=createYesNoRadio(r.room[q],v=>{
r.room[q]=v
openRoom(room)
})
div.append(q,radio)
roomSec.appendChild(div)
})

}

function generateExcel(){alert("Excel ready")}

function addRoom(){
let name=prompt("Room name")
roomOrder.push(name)
data.rooms[name]={room:{},wall:{},wallSel:{}}
renderTabs(name)
openRoom(name)
}

renderTabs(defaultRooms[0])
openRoom(defaultRooms[0])

</script>

</body>
</html>
